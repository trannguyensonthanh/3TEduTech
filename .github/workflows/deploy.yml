name: CI/CD Pipeline for 3T Edu Tech

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./3t-edu-tech-backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './3t-edu-tech-backend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint
        continue-on-error: true # Đổi thành false nếu muốn force check lint

  build-and-test-ai-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ai-service
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v1
        with:
          version: "latest"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies using uv
        run: uv pip install --system -r pyproject.toml

      # Thêm các test runner (như pytest) ở đây nếu có
      # - name: Run Tests
      #   run: pytest

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./edu-ai-learning-hub
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './edu-ai-learning-hub/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build

  dockerize-and-deploy:
    runs-on: ubuntu-latest
    needs: [build-and-test-backend, build-and-test-ai-service, build-frontend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./3t-edu-tech-backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/3t-edu-tech-backend:latest

      - name: Build and Push AI Service Image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/3t-edu-tech-ai-service:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./edu-ai-learning-hub
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/3t-edu-tech-frontend:latest

      # Example: Deploying to a remote VPS via SSH
      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/3t-edu-tech
            # Kéo image mới nhất về
            docker pull ${{ secrets.DOCKER_USERNAME }}/3t-edu-tech-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/3t-edu-tech-ai-service:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/3t-edu-tech-frontend:latest
            
            # Restart các services
            docker-compose down
            docker-compose up -d
