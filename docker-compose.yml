services:
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: edutech-database
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=EduTech_DB_2026!
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    restart: always
    networks:
      - edutech-net

  backend:
    image: ${DOCKER_USERNAME}/3t-edu-tech-backend:latest
    container_name: edutech-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      # - DB_SERVER=${DB_SERVER}
      # - DB_USER=${DB_USER}
      # - DB_PASSWORD=${DB_PASSWORD}
      # - DB_NAME=${DB_NAME}
      - AI_SERVICE_PORT=2111
      # Thêm các biến môi trường khác cần thiết ở đây, hoặc dùng env_file
    env_file:
      - ./3t-edu-tech-backend/.env
    restart: always
    depends_on:
      - database
    networks:
      - edutech-net

  ai-service:
    image: ${DOCKER_USERNAME}/3t-edu-tech-ai-service:latest
    container_name: edutech-ai-service
    ports:
      - "2111:2111"
    environment:
      - PORT=2111
      # - GEMINI_API_KEY=${GEMINI_API_KEY}
    env_file:
      - ./ai-service/.env
    restart: always
    networks:
      - edutech-net
    volumes:
      - ./ai-service/data:/app/data # Persist ChromaDB or document data if needed

  frontend:
    image: ${DOCKER_USERNAME}/3t-edu-tech-frontend:latest
    container_name: edutech-frontend
    ports:
      - "80:80"
    restart: always
    depends_on:
      - backend
    networks:
      - edutech-net

networks:
  edutech-net:
    driver: bridge

volumes:
  mssql-data:
